services:
  api:
    build: .
    container_name: juris-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-juris}:${POSTGRES_PASSWORD:-juris}@db:5432/${POSTGRES_DB:-juris_scraper}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app

  db:
    image: postgres:16-alpine
    container_name: juris-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-juris}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-juris}
      POSTGRES_DB: ${POSTGRES_DB:-juris_scraper}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s # tempo extra para o postgres inicializar

  redis:
    image: redis:7-alpine
    container_name: juris-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  pgdata:
  redis_data:
